apiVersion: 1

providers:
  - name: "Timescale Support Lab Dashboards"
    orgId: 1
    folder: "Timescale Support Lab"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
